name: CI

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy<2.0" pytest pyyaml tqdm scipy soundfile librosa g2p_en
          python -m pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install package if pyproject exists
        run: |
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            python -m pip install -e .
          else
            echo "No pyproject.toml or setup.py yet; skipping editable install."
          fi

      - name: Run tests if present
        run: |
          if [ -d tests ]; then
            python -m pytest -q
          else
            echo "No tests directory yet; skipping pytest."
          fi

      - name: Run config smoke check if available
        run: |
          if [ -f configs/base.yaml ] && [ -d hextts ]; then
            python -c "import sys; from pathlib import Path; sys.path.insert(0, str(Path('.').resolve())); from hextts.config import load_config; cfg = load_config('configs/base.yaml'); print('Config smoke check passed'); print(f'sample_rate={cfg.sample_rate}'); print(f'n_mels={cfg.n_mels}')"
          else
            echo "Config module or base config not present yet; skipping smoke check."
          fi